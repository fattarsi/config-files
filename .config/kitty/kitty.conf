# Font
font_family      DejaVuSansM Nerd Font Mono
font_size        10.0

# Allow remote control so font size can be adjusted on monitor switch
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# Colors (matching gnome-terminal)
foreground       #d0cfcc
background       #000000
background_opacity 1.0

# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no

# Disable kitty's built-in desktop notifications (handled by claude hook instead)
notify_on_cmd_finish never


# Window
hide_window_decorations yes
confirm_os_window_close 0

# Keyboard shortcuts (matching terminator habits)
map ctrl+shift+n new_os_window
map ctrl+w close_window
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+v paste_from_clipboard
map shift+right next_tab
map shift+left previous_tab

# Copy URL to clipboard (highlights URLs, pick one to copy)
map ctrl+shift+u kitten hints --type url --program @

# Reload config
map ctrl+shift+f12 load_config_file

# Mouse
mouse_map ctrl+left click ungrabbed mouse_handle_click link
open_url_with firefox-actualyze
